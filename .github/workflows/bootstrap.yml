name: Bootstrap and Build AramOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Write all project files
        run: |
          echo '' | base64 -d > _bootstrap.py
          python3 _bootstrap.py
          rm _bootstrap.py

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Download proot-arm64 binary
        run: |
          mkdir -p app/src/main/assets
          curl -fL "https://github.com/proot-me/proot/releases/download/v5.4.0/proot-v5.4.0-aarch64-static" \
            -o app/src/main/assets/proot-arm64 || \
          (sudo apt-get install -y proot && cp $(which proot) app/src/main/assets/proot-arm64) || \
          echo "WARNING: proot not downloaded"

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/build.log || true
          echo "==== KOTLIN ERRORS ===="
          grep -E "^e: |error:" /tmp/build.log || echo "no e: lines found"
          echo "==== END ERRORS ===="
          grep -q "BUILD SUCCESSFUL" /tmp/build.log && exit 0 || exit 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AramOS-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
