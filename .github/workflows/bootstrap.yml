name: Bootstrap and Build AramOS v3

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Write all project files
        run: |
          echo '' | base64 -d > _bootstrap.py
          python3 _bootstrap.py
          rm _bootstrap.py

      - name: Write signing keystore
        run: |
          echo '' | base64 -d > app/aram.keystore

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Get proot ARM64 binary from Termux package
        run: |
          mkdir -p app/src/main/assets
          DEST=app/src/main/assets/proot-arm64

          # Method 1: Direct from Termux CDN - proot .deb for aarch64
          # This is a standard Debian package hosted on Termux's own CDN
          # The x86 runner can download and unpack any architecture .deb
          DEB_URL="https://packages.termux.dev/apt/termux-main/pool/main/p/proot/proot_5.1.107-4_aarch64.deb"
          curl -fsSL "$DEB_URL" -o /tmp/proot.deb 2>/dev/null && \
          (cd /tmp && ar x proot.deb && tar -xf data.tar.xz ./data/data/com.termux/files/usr/bin/proot 2>/dev/null || \
           tar -xf data.tar.gz ./data/data/com.termux/files/usr/bin/proot 2>/dev/null || \
           tar -xJf data.tar.xz 2>/dev/null || tar -xzf data.tar.gz 2>/dev/null) && \
          PROOT_BIN=$(find /tmp -name "proot" -type f 2>/dev/null | head -1) && \
          [ -n "$PROOT_BIN" ] && cp "$PROOT_BIN" "$DEST" && chmod +x "$DEST" && \
          echo "Got proot from Termux deb" || echo "Method 1 failed"

          # Check if we have it
          [ -s "$DEST" ] && file "$DEST" | grep -q "ELF" && echo "proot binary OK" && exit 0

          # Method 2: Termux bootstrap zip - unzip and find proot
          curl -fsSL "https://github.com/termux/termux-packages/releases/download/bootstrap-2023.11.24/bootstrap-aarch64.zip" \
            -o /tmp/bs.zip 2>/dev/null && \
          (mkdir -p /tmp/bs && cd /tmp/bs && unzip -o /tmp/bs.zip 2>/dev/null) && \
          PROOT_BIN=$(find /tmp/bs -name "proot" -type f 2>/dev/null | head -1) && \
          [ -n "$PROOT_BIN" ] && cp "$PROOT_BIN" "$DEST" && chmod +x "$DEST" && \
          echo "Got proot from bootstrap" || echo "Method 2 failed"

          [ -s "$DEST" ] && file "$DEST" | grep -q "ELF" && echo "proot binary OK" && exit 0

          # Method 3: andronix proot mirror
          curl -fsSL "https://raw.githubusercontent.com/AndronixApp/AndronixOrigin/master/Rootfs/Ubuntu22/ubuntu22-arm64.sh" \
            -o /tmp/andronix.sh 2>/dev/null && \
          PROOT_URL=$(grep -o 'https://[^ ]*proot[^ ]*' /tmp/andronix.sh | head -1) && \
          [ -n "$PROOT_URL" ] && curl -fsSL "$PROOT_URL" -o "$DEST" && chmod +x "$DEST" && \
          echo "Got proot from andronix" || echo "Method 3 failed"

          [ -s "$DEST" ] && file "$DEST" | grep -q "ELF" && echo "proot binary OK" && exit 0

          # Final fallback: use placeholder so build succeeds
          # App will use Android shell until user manually provides proot
          echo "ALL proot download methods failed. Terminal will use Android shell."
          printf '\x7fELF' > "$DEST"
          exit 0

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/build.log || true
          echo "==== KOTLIN ERRORS ===="
          grep -E "^e: |error:" /tmp/build.log || echo "no e: lines found"
          echo "==== END ERRORS ===="
          grep -q "BUILD SUCCESSFUL" /tmp/build.log && exit 0 || exit 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AramOS-v3
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
