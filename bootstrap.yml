      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Download proot-arm64 binary
        run: |
          mkdir -p app/src/main/assets
          curl -fL "https://github.com/termux/termux-packages/releases/download/bootstrap-2024.01.01/proot-arm64" \
            -o app/src/main/assets/proot-arm64 || echo "proot download failed, will try fallback in build"
          ls -lh app/src/main/assets/ || true

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AramOS-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
